name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Build VitePress site (main site)
      - name: Install VitePress dependencies
        run: npm ci
      - name: Build VitePress
        run: npx vitepress build docs
        env:
          BASE: /smedjan_staging/

      # Copy VitePress output as base
      - name: Prepare output
        run: |
          mkdir -p _site
          cp -r docs/.vitepress/dist/* _site/

      # Build Astro landing pages
      - name: Install Astro dependencies
        working-directory: landing
        run: npm ci
      - name: Build Astro
        working-directory: landing
        run: npx astro build

      # Merge Astro output into site
      - name: Merge Astro pages
        run: |
          cp -r landing/dist/* _site/ 2>/dev/null || true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
