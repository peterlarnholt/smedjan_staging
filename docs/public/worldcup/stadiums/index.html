};
function setLang(lang){
  var t=translations[lang]||translations.en;
  document.documentElement.dir=lang==='ar'?'rtl':'ltr';
  document.documentElement.lang=lang;
  var h1=document.querySelector('h1');if(h1)h1.textContent=t.title;
  var sub=document.querySelector('.subtitle');if(sub)sub.textContent=t.subtitle;
  var back=document.querySelector('.nav-back');if(back)back.textContent=t.back;
  var ctaP=document.querySelector('.cta-bar p');if(ctaP)ctaP.textContent=t.ctaText;
  var ctaBtn=document.querySelector('.cta-btn');if(ctaBtn)ctaBtn.textContent=t.cta;
  var footerP=document.querySelector('footer p');if(footerP)footerP.innerHTML='&copy; 2026 Handled. '+t.footer;
  document.querySelectorAll('.lang-btn').forEach(function(btn){
    if(btn.dataset.lang===lang){btn.style.border='1px solid rgba(37,211,102,0.3)';btn.style.background='rgba(37,211,102,0.15)';btn.style.color='#25D366'}
    else{btn.style.border='1px solid transparent';btn.style.background='transparent';btn.style.color='#a0a0a0'}
  });
  localStorage.setItem('wc-lang',lang);
}
var savedLang=localStorage.getItem('wc-lang');
if(savedLang&&savedLang!=='en')setLang(savedLang);
