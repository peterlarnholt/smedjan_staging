<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
  background: #1b1a20;
  color: #fff;
  width: 1366px;
  height: 768px;
  overflow: hidden;
}

.header {
  display: flex;
  align-items: center;
  padding: 12px 20px;
  background: #1b1a20;
  border-bottom: 1px solid #2d2c33;
  height: 52px;
}
.header .icon {
  width: 32px; height: 32px; border-radius: 6px; background: #5b5fc7;
  display: flex; align-items: center; justify-content: center; margin-right: 12px;
  font-size: 18px;
}
.header .name { font-weight: 600; font-size: 15px; }
.header .tabs { margin-left: 24px; display: flex; gap: 16px; }
.header .tab { font-size: 13px; color: #adadb8; cursor: pointer; padding: 4px 0; }
.header .tab.active { color: #fff; border-bottom: 2px solid #5b5fc7; }
.header .right { margin-left: auto; display: flex; gap: 16px; color: #adadb8; font-size: 18px; }

.chat {
  padding: 20px 60px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  height: calc(768px - 52px - 56px);
  overflow: hidden;
}

.date-divider {
  text-align: center;
  color: #adadb8;
  font-size: 12px;
  padding: 8px 0;
}

.msg-group {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.msg-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
}

.msg-row.user {
  justify-content: flex-end;
}

.avatar {
  width: 32px; height: 32px; border-radius: 6px; background: #5b5fc7;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}

.msg-content { max-width: 65%; }

.sender-info {
  display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px;
}
.sender-name { font-weight: 600; font-size: 13px; }
.msg-time { font-size: 11px; color: #adadb8; }

.bubble {
  padding: 10px 16px;
  border-radius: 6px;
  font-size: 14px;
  line-height: 1.5;
  white-space: pre-wrap;
}

.bubble.bot {
  background: #2d2c33;
  color: #e8e8ed;
  border-top-left-radius: 2px;
}

.bubble.user-bubble {
  background: #5b5fc7;
  color: #fff;
  border-top-right-radius: 2px;
  margin-left: auto;
}

.user-time {
  text-align: right;
  font-size: 11px;
  color: #adadb8;
  margin-bottom: 4px;
}

.input-bar {
  margin: 0 60px;
  background: #2d2c33;
  border-radius: 8px;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: absolute;
  bottom: 16px;
  left: 0;
  right: 0;
  margin: 0 60px;
}
.input-bar .placeholder { color: #7a7a85; font-size: 14px; }
.input-bar .icons { display: flex; gap: 14px; color: #adadb8; font-size: 18px; }

a { color: #7b83eb; text-decoration: underline; }

.bullet-list {
  padding-left: 18px;
  margin: 6px 0;
}
.bullet-list li {
  margin: 2px 0;
  line-height: 1.5;
}
</style>
</head>
<body>

<div class="header">
  <div class="icon">&#10004;</div>
  <span class="name">Handled</span>
  <div class="tabs">
    <span class="tab active">Chat</span>
    <span class="tab">Shared</span>
  </div>
  <div class="right">
    <span>&#128269;</span>
    <span>&#8942;</span>
  </div>
</div>

<div class="chat" id="chat">
</div>

<div class="input-bar">
  <span class="placeholder">Type a message</span>
  <div class="icons">
    <span>&#9998;</span>
    <span>&#9786;</span>
    <span>&#128206;</span>
    <span>+</span>
    <span style="margin-left:8px">&#9654;</span>
  </div>
</div>

</body>
</html>
